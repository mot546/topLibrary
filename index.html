<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="./javascript.js" defer></script>
    <title>Library</title>
</head>
<body>
    <header>
        <h1 class="title">Library</h1>

    </header>
    <main>
        <div class="card-container">
            <div class="card">
                <p class="book-title">SAMPLE</p>
                <p class="author">JK Rowling</p>
                <p class="pages">200 pages</p>
                <div class="read-container"><input type="checkbox" id="read"><label for="read">Finished</label></div>
                <button command>Remove</button>
            </div>
        </div>
        <button class="add-book" command="show-modal" commandfor="form-dialog">+</button>
        <dialog id="form-dialog">
            <form action="" method="post" id="form-inside">
                <div class="input-group"><label for="title">Title:</label><input id="title" type="text" required></div>
                <div class="input-group"><label for="author">Author: </label><input type="text" id="author" required></div>
                <div class="input-group"><label for="pages">Pages: </label><input id="pages" type="text" required></div>
                <div class="input-group"><label for="read">Finished</label><input id="read" type="checkbox"></div>
                <button type="submit" id="submit">Submit</button>
                <button type="button" commandfor="form-dialog" command="close">Close</button>
            </form>
        </dialog>
    </main>
    <footer></footer>
</body>
</html>
